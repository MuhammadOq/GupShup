name: gupshup
description: A complete WhatsApp-clone app called GupShup.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.2.1

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0

  # RTC & Notifications
  agora_rtc_engine: ^6.3.2
  onesignal_flutter: ^5.1.0

  # AI
  google_generative_ai: ^0.4.0

  # Models & Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # UI Components
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  font_awesome_flutter: ^11.0.0
  emoji_picker_flutter: ^4.4.0
  intl: ^0.20.2
  
  # Media & Files
  image_picker: ^1.1.0
  file_picker: ^11.0.2
  path_provider: ^2.1.3
  permission_handler: ^12.0.1
  audioplayers: ^6.6.0
  record: ^6.2.0
  video_player: ^2.8.2
  chewie: ^1.7.5

  # Utils
  share_plus: ^12.0.2
  url_launcher: ^6.2.6
  flutter_contacts: ^1.1.9+2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  geolocator: ^14.0.2
  latlong2: ^0.9.1
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.0+1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#004080"
  image: "assets/images/splash.png"
  android_12:
    image: "assets/images/splash.png"
    color: "#004080"
